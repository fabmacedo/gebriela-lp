services:
  db:
    image: mysql:8.4
    container_name: gabriela-site-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gabriela_site
      MYSQL_USER: gabriela_user
      MYSQL_PASSWORD: gabriela_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - gabriela_mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/001-database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: gabriela-site-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: gabriela_site
      DB_USER: gabriela_user
      DB_PASS: gabriela_pass
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html

volumes:
  gabriela_mysql_data:
